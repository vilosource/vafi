# Standalone Playwright MCP server, shared by all vafi-developer contexts
# (vfdev, ogcli, ogdr, ...). Runs Microsoft's @playwright/mcp as a streamable
# HTTP server so dev containers can connect without shipping chromium + browser
# system deps in every image.
#
# Usage:
#   docker compose -f ~/GitHub/vafi/mcp-servers/playwright/docker-compose.yml up -d
#
# Endpoint (inside docker networks): http://playwright-mcp:8931/mcp
# The --allowed-hosts guard REJECTS host.docker.internal and bare IPs; clients
# must resolve the server by the `playwright-mcp` hostname. vf-launchers.sh
# idempotently attaches this container to the per-context <ctx>-dev networks.

services:
  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp
    container_name: playwright-mcp
    restart: unless-stopped
    command:
      - --port
      - "8931"
      - --host
      - 0.0.0.0
      - --headless
      - --no-sandbox
      - --allowed-hosts
      - playwright-mcp:8931,localhost
    ports:
      - "8931:8931"
    networks:
      - vafi-mcp

networks:
  vafi-mcp:
    external: true
