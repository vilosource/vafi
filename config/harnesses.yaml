harnesses:
  claude:
    image: harbor.viloforge.com/vafi/vafi-agent:2c64c34
    description: Claude Code CLI
    output_format: claude_json
    supports_rpc: false
    secrets:
      - secret: vafi-secrets
        env_map:
          anthropic-auth-token: ANTHROPIC_AUTH_TOKEN
          anthropic-base-url: ANTHROPIC_BASE_URL
          vtf-token: VF_VTF_TOKEN

  pi:
    image: harbor.viloforge.com/vafi/vafi-agent-pi:d84c1e8-npm-fix
    description: Pi coding agent
    output_format: pi_jsonl
    supports_rpc: true
    secrets:
      - secret: vafi-secrets
        env_map:
          anthropic-auth-token: ANTHROPIC_API_KEY
          anthropic-base-url: ANTHROPIC_BASE_URL
          vtf-token: VF_VTF_TOKEN

  bash-agent:
    image: harbor.viloforge.com/vafi/vafi-bash-agent:latest
    description: Bash-only test harness (no AI CLI)
    output_format: raw_text
    supports_rpc: false
    secrets: []
