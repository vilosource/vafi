---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cxdb-server
  namespace: vafi-agents
  labels:
    app.kubernetes.io/name: cxdb-server
    app.kubernetes.io/component: trace-store
    app.kubernetes.io/part-of: vafi
spec:
  serviceName: cxdb-server
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cxdb-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cxdb-server
        app.kubernetes.io/component: trace-store
        app.kubernetes.io/part-of: vafi
    spec:
      containers:
        - name: cxdb
          image: harbor.viloforge.com/vafi/cxdb:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: CXDB_DATA_DIR
              value: "/data"
            # cxdb-server HTTP listens on 9010 internally, nginx proxies on port 80
            - name: CXDB_HTTP_BIND
              value: "127.0.0.1:9010"
            - name: CXDB_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: cxdb-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /v1/contexts?limit=1
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/contexts?limit=1
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
  volumeClaimTemplates:
    - metadata:
        name: cxdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
