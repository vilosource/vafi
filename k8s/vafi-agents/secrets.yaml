---
# Placeholder secrets - NEVER commit actual values to git
# Create actual secrets with:
#   kubectl create secret generic vafi-secrets -n vafi-agents \
#     --from-literal=anthropic-auth-token="$ZAI_API_KEY" \
#     --from-literal=anthropic-base-url="https://api.z.ai/api/anthropic" \
#     --from-literal=vtf-token="<vtf-api-token>"
#
#   kubectl create secret generic github-ssh -n vafi-agents \
#     --from-file=ssh-privatekey=$HOME/.ssh/github \
#     --from-file=ssh-publickey=$HOME/.ssh/github.pub
apiVersion: v1
kind: Secret
metadata:
  name: vafi-secrets
  namespace: vafi-agents
  labels:
    app.kubernetes.io/name: vafi-secrets
    app.kubernetes.io/part-of: vafi
type: Opaque
stringData:
  anthropic-auth-token: "PLACEHOLDER"
  anthropic-base-url: "https://api.z.ai/api/anthropic"
  vtf-token: "PLACEHOLDER"
