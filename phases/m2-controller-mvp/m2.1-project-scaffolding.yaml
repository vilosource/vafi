title: "M2.1: Python project scaffolding"
description: |
  Set up the Python project structure for the vafi controller.
  This is the foundation all other M2 tasks build on.

files:
  create:
    - pyproject.toml
    - src/controller/__init__.py
    - src/controller/__main__.py
    - src/controller/config.py
    - tests/__init__.py
    - tests/conftest.py

implementation:
  approach: |
    Create pyproject.toml with:
    - Project name: vafi-controller
    - Python >= 3.11
    - Dependencies: httpx (async HTTP), pyyaml
    - Dev dependencies: pytest, pytest-asyncio
    - Entry point: python -m controller

    Create src/controller/__main__.py as the entry point that:
    - Reads config from environment variables (VF_AGENT_ID, VF_AGENT_ROLE,
      VF_VTF_API_URL, VF_POLL_INTERVAL, etc.)
    - Prints config and exits (no loop yet — that's M2.3)

    Create src/controller/config.py with an AgentConfig dataclass that
    reads all VF_* env vars with sensible defaults.

    Create tests/conftest.py with basic pytest fixtures.

  references:
    - docs/vafi-DESIGN.md (env vars section, line ~906)
    - docs/vtf-vafi-interface-CONTRACT.md (data types)

acceptance_criteria:
  - pyproject.toml is valid and installable (pip install -e .)
  - python -m controller reads env vars and prints config
  - pytest runs with 0 errors (even if 0 tests)
  - AgentConfig reads VF_AGENT_ID, VF_AGENT_ROLE, VF_VTF_API_URL,
    VF_POLL_INTERVAL, VF_TASK_TIMEOUT, VF_MAX_REWORK, VF_AGENT_TAGS

test_command: "cd /home/jasonvi/GitHub/vafi && pip install -e . && python -m controller --help 2>&1 || python -m controller 2>&1 | head -5 && pytest tests/ -q"
agent_model: sonnet
judge: true
