title: "M2.4: Controller poll-claim loop"
description: |
  Implement the core controller loop that polls for work, claims tasks,
  and logs what it would execute. No harness invocation yet — this
  validates the poll/claim cycle works end-to-end.

files:
  create:
    - src/controller/controller.py
  modify:
    - src/controller/__main__.py

implementation:
  approach: |
    Create src/controller/controller.py with a Controller class:
    - __init__(work_source: WorkSource, config: AgentConfig)
    - async run(): the main loop
      1. Register with work source
      2. Loop:
         a. Poll for work (rework priority, then claimable)
         b. If no work: sleep poll_interval, continue
         c. Claim the task
         d. Log "Claimed task {id}: {title}" and task details
         e. Log "Would execute (harness not implemented)"
         f. Call work_source.fail(task_id, "harness not implemented")
         g. Continue loop

    Update __main__.py to:
    - Create VtfClient from config
    - Create VtfWorkSource from client
    - Create Controller from work source and config
    - Run asyncio.run(controller.run())

    The controller should handle KeyboardInterrupt gracefully (log
    "Shutting down" and exit).

    This task intentionally does NOT invoke the harness. It proves:
    - Registration works (upsert on restart)
    - Polling works (finds claimable tasks)
    - Claiming works (task transitions to doing)
    - The loop runs continuously

  references:
    - docs/vtf-vafi-interface-CONTRACT.md (interaction points 1-4)
    - docs/controller-DESIGN.md (D1, D4)

  constraints:
    - Use asyncio, not threading
    - Controller depends only on WorkSource protocol, not VtfClient
    - Graceful shutdown on SIGINT/SIGTERM

acceptance_criteria:
  - Controller starts, registers agent with vtf, enters poll loop
  - When a task is submitted in vtf, controller detects and claims it
  - Controller logs task details and fails it (harness not ready)
  - On restart, registration succeeds (upsert, no duplicate)
  - Ctrl+C shuts down cleanly

test_command: "cd /home/jasonvi/GitHub/vafi && python -m controller 2>&1 | head -20"
agent_model: sonnet
judge: true
depends_on:
  - m2.3
