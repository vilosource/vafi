title: "M2.8: Agent image and k8s deployment"
description: |
  Build the vafi-agent Docker image with the controller baked in,
  create the k8s deployment manifest, and deploy to the cluster.
  This is the M2 value gate — first autonomous task execution.

files:
  create:
    - images/agent/Dockerfile
    - k8s/vafi-agents/executor-pool.yaml
    - k8s/vafi-agents/sessions-pvc.yaml
    - k8s/vafi-agents/secrets.yaml
    - k8s/vafi-agents/kustomization.yaml
    - scripts/deploy.sh
  modify:
    - scripts/build-images.sh

implementation:
  approach: |
    Create images/agent/Dockerfile:
    - FROM vafi-claude:latest
    - COPY src/controller/ /opt/vf-agent/controller/
    - COPY methodologies/ /opt/vf-agent/methodologies/
    - COPY templates/ /opt/vf-agent/templates/
    - COPY pyproject.toml /opt/vf-agent/
    - RUN pip install /opt/vf-agent/
    - Entrypoint script that:
      1. Copies methodology to ~/.claude/CLAUDE.md based on VF_AGENT_ROLE
      2. Runs python -m controller

    Create k8s/vafi-agents/executor-pool.yaml:
    - Deployment with replicas=1
    - Pod spec with VF_* env vars from config and secrets
    - Volume mounts: sessions PVC at /sessions/
    - imagePullPolicy: Always

    Create k8s/vafi-agents/sessions-pvc.yaml:
    - PVC for /sessions/ shared volume (10Gi)

    Create k8s/vafi-agents/secrets.yaml:
    - Placeholder for Claude credentials and vtf token
    - Actual values applied manually (gitignored)

    Create scripts/deploy.sh:
    - kubectl apply namespaces
    - kubectl apply -k k8s/vafi-agents/

    Update scripts/build-images.sh to build vafi-agent layer.

    VALUE GATE TEST:
    1. Build and push vafi-agent image
    2. Create a test task in vtf (via web UI or vtf CLI)
    3. Deploy executor-pool
    4. Watch logs: kubectl logs -f deploy/executor-pool -n vafi-agents
    5. Executor registers, polls, finds task, claims, clones, executes,
       runs gates, reports complete
    6. vtf shows task as done

  references:
    - docs/vafi-DESIGN.md (image strategy, container-internal architecture)
    - docs/vafi-DESIGN.md (k8s deployment, env vars)
    - CLAUDE.md (make targets)

  constraints:
    - One image, role by VF_AGENT_ROLE env var
    - Image pushed to internal registry (192.168.2.90:30500)
    - Secrets never committed to git

acceptance_criteria:
  - vafi-agent image builds successfully
  - Executor pod starts in k8s and registers with vtf
  - Executor picks up a task, clones repo, invokes Claude Code
  - Gates run and result reported to vtf
  - Task shows as complete (or failed with gate output) in vtf

test_command: "KUBECONFIG=~/.kube/vafi-dev.yaml kubectl -n vafi-agents get pods && KUBECONFIG=~/.kube/vafi-dev.yaml kubectl -n vafi-agents logs deploy/executor-pool --tail=20"
agent_model: sonnet
judge: true
depends_on:
  - m2.7
