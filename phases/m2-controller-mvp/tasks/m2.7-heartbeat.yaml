id: m2.7
name: Async heartbeat during execution
depends_on:
- m2.6
description: 'Implement the heartbeat coroutine that runs concurrently with harness

  execution to keep the task claim alive in vtf.

  '
files:
  create:
  - src/controller/heartbeat.py
  - tests/test_heartbeat.py
  modify:
  - src/controller/controller.py
implementation:
  approach: 'Create src/controller/heartbeat.py:

    - async heartbeat_loop(work_source, task_id, interval_seconds)

    - Calls work_source.heartbeat(task_id) every interval_seconds

    - Logs each heartbeat

    - Runs until cancelled (asyncio.CancelledError)


    Update controller.py execute() to:

    1. Start heartbeat as asyncio.create_task() before invoking harness

    2. Run harness + gates

    3. Cancel heartbeat task after completion

    4. await the cancelled task to ensure clean shutdown


    The heartbeat interval should be claim_timeout / 2. For MVP,

    use VF_HEARTBEAT_INTERVAL env var (default: 300 seconds = 5 min,

    matching vtf''s default 10 min claim timeout / 2).

    '
  references:
  - docs/vtf-vafi-interface-CONTRACT.md (interaction point 5: heartbeat)
  - docs/controller-DESIGN.md (D1 asyncio)
  constraints:
  - Must use asyncio (concurrent with subprocess, not threading)
  - Must handle CancelledError gracefully
  - Must not block harness execution
acceptance_criteria:
- Heartbeat fires at configured interval during execution
- Heartbeat stops when task completes or fails
- vtf claim_expires_at extends with each heartbeat
- If heartbeat task is cancelled, no exception propagates
test_command: cd /home/jasonvi/GitHub/vafi && pytest tests/test_heartbeat.py -q
agent_model: sonnet
judge: true
