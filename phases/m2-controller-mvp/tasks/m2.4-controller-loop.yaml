id: m2.4
name: Controller poll-claim loop
depends_on:
- m2.3
description: 'Implement the core controller loop that polls for work, claims tasks,

  and logs what it would execute. No harness invocation yet — this

  validates the poll/claim cycle works end-to-end.

  '
files:
  create:
  - src/controller/controller.py
  modify:
  - src/controller/__main__.py
implementation:
  approach: "Create src/controller/controller.py with a Controller class:\n- __init__(work_source: WorkSource, config: AgentConfig)\n\
    - async run(): the main loop\n  1. Register with work source\n  2. Loop:\n     a. Poll for work (rework priority, then\
    \ claimable)\n     b. If no work: sleep poll_interval, continue\n     c. Claim the task\n     d. Log \"Claimed task {id}:\
    \ {title}\" and task details\n     e. Log \"Would execute (harness not implemented)\"\n     f. Call work_source.fail(task_id,\
    \ \"harness not implemented\")\n     g. Continue loop\n\nUpdate __main__.py to:\n- Create VtfClient from config\n- Create\
    \ VtfWorkSource from client\n- Create Controller from work source and config\n- Run asyncio.run(controller.run())\n\n\
    The controller should handle KeyboardInterrupt gracefully (log\n\"Shutting down\" and exit).\n\nThis task intentionally\
    \ does NOT invoke the harness. It proves:\n- Registration works (upsert on restart)\n- Polling works (finds claimable\
    \ tasks)\n- Claiming works (task transitions to doing)\n- The loop runs continuously\n"
  references:
  - docs/vtf-vafi-interface-CONTRACT.md (interaction points 1-4)
  - docs/controller-DESIGN.md (D1, D4)
  constraints:
  - Use asyncio, not threading
  - Controller depends only on WorkSource protocol, not VtfClient
  - Graceful shutdown on SIGINT/SIGTERM
acceptance_criteria:
- Controller starts, registers agent with vtf, enters poll loop
- When a task is submitted in vtf, controller detects and claims it
- Controller logs task details and fails it (harness not ready)
- On restart, registration succeeds (upsert, no duplicate)
- Ctrl+C shuts down cleanly
test_command: cd /home/jasonvi/GitHub/vafi && python -m controller 2>&1 | head -20
agent_model: sonnet
judge: true
