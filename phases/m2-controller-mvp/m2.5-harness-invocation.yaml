title: "M2.5: Harness invocation — clone, prompt, execute"
description: |
  Implement the task execution pipeline: clone the repo, build the
  prompt from a template, invoke Claude Code CLI as a subprocess,
  and parse the structured JSON output. This is the core of vafi.

files:
  create:
    - src/controller/invoker.py
    - src/controller/prompt.py
    - templates/task.txt
    - methodologies/executor.md
    - tests/test_invoker.py
  modify:
    - src/controller/controller.py

implementation:
  approach: |
    Create src/controller/prompt.py:
    - load_template(path) -> str
    - render_prompt(template, task: TaskInfo) -> str
    - Simple string format: {id}, {title}, {spec}, {test_command}

    Create templates/task.txt:
    ```
    Implement the following task.

    ## Task: {title} ({id})

    ## Specification
    {spec}

    ## Test Commands
    {test_command}
    ```

    Create methodologies/executor.md:
    - Agent role instructions (blast radius analysis, reference-driven
      development, completion report format)
    - This gets copied to ~/.claude/CLAUDE.md inside the container

    Create src/controller/invoker.py with a HarnessInvoker class:
    - __init__(config: AgentConfig)
    - async invoke(task: TaskInfo, repo: RepoInfo, workdir: Path,
                   prompt: str) -> ExecutionResult

    invoke() does:
    1. Clone repo into workdir if not already cloned:
       git clone --branch {repo.branch} {repo.url} {workdir}
    2. Build the CLI command:
       claude -p "{prompt}" --output-format json --dangerously-skip-permissions
    3. Run as subprocess with cwd=workdir, capture stdout/stderr
    4. Parse JSON output: extract result, is_error, session_id,
       total_cost_usd, num_turns
    5. Return ExecutionResult

    Error handling:
    - Exit code != 0: classify error (auth, rate_limit, OOM, timeout)
    - is_error == true: task failed, include result text
    - Parse failure: task failed with raw output

    Update controller.py execute() method:
    - Create workdir at /sessions/<milestone-id>/<task-id>/
    - Get repo info from work source
    - Build prompt from template
    - Call invoker.invoke()
    - Return the ExecutionResult (gates come in next task)

  references:
    - docs/vafi-DESIGN.md (prompt construction, output parsing, three-level failure)
    - docs/controller-DESIGN.md (D6 dynamic workdirs, D8 subprocess)
    - docs/vtf-vafi-interface-CONTRACT.md (ExecutionResult type)

  constraints:
    - Use subprocess, not Docker API
    - Parse JSON output only — never parse LLM text
    - Workdir at /sessions/<milestone-id>/<task-id>/ (or configurable base)
    - Git clone via subprocess (not gitpython)

acceptance_criteria:
  - Prompt template renders correctly with task data
  - Invoker clones repo into workdir
  - Invoker runs claude -p with correct flags
  - JSON output parsed into ExecutionResult
  - Error classification works (exit code, is_error, parse failure)
  - Controller creates workdir and calls invoker

test_command: "cd /home/jasonvi/GitHub/vafi && pytest tests/test_invoker.py -q"
agent_model: sonnet
judge: true
depends_on:
  - m2.4
