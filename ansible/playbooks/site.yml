---
# Master playbook — provisions the full server
#
# Usage:
#   cd ansible && ansible-playbook playbooks/site.yml -i inventory/dev.yml

- name: Base OS configuration
  hosts: k3s
  become: true
  roles:
    - role: ../roles/common

- name: Install and configure k3s
  hosts: k3s
  become: true
  roles:
    - role: ../roles/k3s
