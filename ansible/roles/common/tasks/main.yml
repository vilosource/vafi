---
- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Enable unattended-upgrades for security patches
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"

- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow k3s API server through UFW
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp

- name: Allow k8s NodePort range through UFW
  community.general.ufw:
    rule: allow
    port: "30000:32767"
    proto: tcp

- name: Allow WireGuard through UFW
  community.general.ufw:
    rule: allow
    port: "{{ wg_port | default('51820') }}"
    proto: udp

- name: Allow HTTP through UFW
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through UFW
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming
  notify: reload ufw
