# vafi Helm chart values
# See docs/helm-migration-PLAN.md for full documentation.

# -- Container images
image:
  agent:
    repository: vafi-agent
    tag: latest
    pullPolicy: Always
  base:
    repository: vafi-base
    tag: latest
  cxdb:
    repository: cxdb
    tag: latest
    pullPolicy: Always

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override release name
nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Executor — AI agent that polls for and executes tasks
# ---------------------------------------------------------------------------
executor:
  replicas: 1
  role: executor
  tags: "executor"
  agentId: ""              # empty = auto-generated by controller
  pollInterval: 30
  taskTimeout: 600
  maxRework: 3
  maxTurns: 50
  heartbeatInterval: 300
  sessionsDir: "/sessions"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 2
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Executor (Pi harness) — Pi-based agent for pi-tagged tasks
# ---------------------------------------------------------------------------
# Runs a separate deployment of the executor controller with the pi harness
# image. Agents register with tags "executor,pi" and only claim pi-tagged
# tasks. Set replicas to 0 to disable.
executorPi:
  # Disabled by default — enable per-environment (see vafi-deploy/environments/*.yaml).
  # Prevents unused pi executor pods in environments with no pi workload.
  enabled: false
  replicas: 1
  # Dedicated sessions PVC. When `dedicated: false` (default) the pi
  # executor mounts the shared `vafi-sessions` PVC alongside the claude
  # executor. This only works on single-node clusters (RWO). For
  # multi-node clusters, set `dedicated: true` to provision a separate
  # `vafi-sessions-pi` PVC so the two pods never race for the volume.
  sessionsPvc:
    dedicated: false
    storage: ""              # empty = inherit .Values.sessions.storage
    storageClassName: ""     # empty = inherit .Values.sessions.storageClassName
  role: executor
  tags: "executor,pi"
  agentId: ""
  pollInterval: 30
  taskTimeout: 600
  maxRework: 3
  maxTurns: 50
  heartbeatInterval: 300
  sessionsDir: "/sessions"
  harness: "pi"
  piProvider: "anthropic"
  piModel: "claude-sonnet-4-20250514"
  outputFormat: "pi_jsonl"
  image:
    repository: harbor.viloforge.com/vafi/vafi-agent-pi
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 2
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Judge — AI agent that reviews completed tasks
# ---------------------------------------------------------------------------
judge:
  replicas: 0              # 0 = disabled by default
  role: judge
  tags: "judge"
  agentId: ""
  pollInterval: 30
  taskTimeout: 600
  maxTurns: 50
  heartbeatInterval: 300
  sessionsDir: "/sessions"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 2
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Bridge — REST+WebSocket service that brokers console→agent-pod sessions
# ---------------------------------------------------------------------------
bridge:
  enabled: true
  replicas: 1
  image:
    repository: harbor.viloforge.com/vafi/vafi-bridge
    tag: latest
    pullPolicy: Always
  # Image used for locked agent pods (architect/web_designer) spawned by the bridge
  agentPiImage: "harbor.viloforge.com/vafi/vafi-agent-pi:latest"
  service:
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "2000m"
  rolesConfig: |
    roles:
      architect:
        session_type: locked
        model: claude-sonnet-4-20250514
        thinking_level: medium
        methodology: /opt/vf-agent/methodologies/architect.md
        mcp_tools:
          - vtf
          - cxdb
        idle_timeout_hours: 4
        description: Interactive planning and design sessions

      assistant:
        session_type: ephemeral
        model: claude-sonnet-4-20250514
        thinking_level: low
        methodology: ""
        mcp_tools:
          - vtf
          - cxdb
        description: Task management, status queries, quick operations

# ---------------------------------------------------------------------------
# vtf — task tracker API that the executor polls for work
# ---------------------------------------------------------------------------
vtf:
  apiUrl: ""               # required — in-cluster vtf API URL
  mcpUrl: ""               # required for bridge — in-cluster vtf MCP URL (e.g. http://vtf-mcp.<ns>.svc.cluster.local:8002/mcp)

# ---------------------------------------------------------------------------
# CXDB — execution trace store (disable if not using trace collection)
# ---------------------------------------------------------------------------
cxdb:
  enabled: true
  publicUrl: ""            # external URL for trace links (shown in vtf UI)
  storage: 10Gi
  storageClassName: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 2
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Sessions — shared volume for per-task working directories
# ---------------------------------------------------------------------------
sessions:
  storage: 10Gi
  storageClassName: ""

# ---------------------------------------------------------------------------
# Ingress — external access to CXDB web UI
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  cxdbHost: ""
  tls:
    enabled: false
    secretName: cxdb-tls

# ---------------------------------------------------------------------------
# cert-manager Certificate
# ---------------------------------------------------------------------------
certificate:
  enabled: false
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

# ---------------------------------------------------------------------------
# Secrets
# Set existingSecret to use a pre-created secret (recommended for production).
# Otherwise the chart generates vafi-secrets from the values below.
# The github-ssh secret is always pre-created out-of-band.
# ---------------------------------------------------------------------------
secrets:
  existingSecret: ""
  anthropicAuthToken: ""
  anthropicBaseUrl: "https://api.anthropic.com"
  vtfToken: ""

sshSecret:
  name: github-ssh
