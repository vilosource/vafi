{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vafi.fullname" . }}-secrets
  labels:
    {{- include "vafi.labels" . | nindent 4 }}
type: Opaque
stringData:
  anthropic-auth-token: {{ .Values.secrets.anthropicAuthToken | quote }}
  anthropic-base-url: {{ .Values.secrets.anthropicBaseUrl | quote }}
  vtf-token: {{ .Values.secrets.vtfToken | quote }}
{{- end }}
