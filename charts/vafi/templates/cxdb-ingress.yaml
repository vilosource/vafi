{{- if and .Values.cxdb.enabled .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vafi.fullname" . }}-cxdb
  labels:
    {{- include "vafi.labels" . | nindent 4 }}
    {{- include "vafi.selectorLabels" (dict "root" . "component" "cxdb") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.cxdbHost }}
      http:
        paths:
          - backend:
              service:
                name: {{ include "vafi.cxdbName" . }}
                port:
                  number: 80
            path: /
            pathType: Prefix
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.cxdbHost }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end }}
